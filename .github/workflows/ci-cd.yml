name: Production

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # v7.0.0

      - name: Login Container Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" \
          | docker login zot.idjiot-sandwiches.my.id \
          -u "${{ secrets.REGISTRY_USERNAME }}" \
          --password-stdin

      - name: Set Env Variable
        run: |
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "REGISTRY=zot.idjiot-sandwiches.my.id" >> $GITHUB_ENV

      - name: Build PHP image
        run: |
          docker build \
            --provenance=false \
            -f docker/Dockerfile \
            --target php-fpm \
            --build-arg VITE_APP_NAME="Mini HRMS Rebuild" \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mini-hrms-php:latest \
            .

      - name: Build Nginx image
        run: |
          docker build \
            --provenance=false \
            -f docker/Dockerfile \
            --target web \
            --build-arg VITE_APP_NAME="Mini HRMS Rebuild" \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mini-hrms-web:latest \
            .

      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mini-hrms-php:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mini-hrms-web:latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign PHP image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
        run: |
          cosign sign \
            --key env://COSIGN_KEY \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mini-hrms-php:latest

      - name: Sign Web image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
        run: |
          cosign sign \
            --key env://COSIGN_KEY \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mini-hrms-web:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Verify Database Health
        run: |
          echo "Checking MariaDB container runtime status..."

          RAW_STATUS=$(docker inspect -f '{{.State.Status}}' mariadb 2>/dev/null || echo "not_found")
          DB_STATUS=$(echo "$RAW_STATUS" | tr -d '\r\n ')

          echo "Database container status is currently: [$DB_STATUS]"
          if [ "$DB_STATUS" = "running" ]; then
            echo "✅ Database is online and running. Proceeding with deployment."
          else
            echo "❌ CRITICAL: Database container is offline or missing! (Status: $DB_STATUS)"
            echo "Aborting deployment to protect application state."
            exit 1
          fi

      - name: Deploy server
        run: |
          mkdir -p /home/idjiot/apps/mini-hrms-rebuild
          cd /home/idjiot/apps/mini-hrms-rebuild

          docker compose pull
          docker compose up -d

          docker compose exec -T php-fpm php artisan migrate --force
          docker compose exec -T php-fpm php artisan optimize

          docker image prune -a -f
          docker builder prune -f
