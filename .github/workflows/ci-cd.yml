name: Production

on:
  push:
    branches:
      - main
      
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # v7.0.0

      - name: Set Env Variable
        run: |
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "REGISTRY=zot.idjiot-sandwiches.my.id" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Login Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push all targets
        uses: docker/bake-action@v6
        with:
          files: .github/bake/docker.hcl
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images by Digest
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
        run: |
          IMAGES=(
            "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mini-hrms-php:latest"
            "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mini-hrms-scheduler:latest"
            "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mini-hrms-web:latest"
          )

          for IMAGE in "${IMAGES[@]}"; do
            # Fetch the exact immutable digest from the registry
            DIGEST=$(crane digest "$IMAGE" || docker manifest inspect "$IMAGE" -v | jq -r '.Descriptor.digest // .[0].Descriptor.digest')
            BASE_REF="${IMAGE%%:*}"
            
            echo "Signing $BASE_REF@$DIGEST"
            cosign sign --yes --key env://COSIGN_KEY "$BASE_REF@$DIGEST"
          done

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Verify Database Health
        run: |
          echo "Checking MariaDB container runtime status..."

          RAW_STATUS=$(docker inspect -f '{{.State.Status}}' mariadb 2>/dev/null || echo "not_found")
          DB_STATUS=$(echo "$RAW_STATUS" | tr -d '\r\n ')

          echo "Database container status is currently: [$DB_STATUS]"
          if [ "$DB_STATUS" = "running" ]; then
            echo "✅ Database is online and running. Proceeding with deployment."
          else
            echo "❌ CRITICAL: Database container is offline or missing! (Status: $DB_STATUS)"
            echo "Aborting deployment to protect application state."
            exit 1
          fi

      - name: Deploy server
        run: |
          mkdir -p /home/idjiot/apps/mini-hrms-rebuild
          cd /home/idjiot/apps/mini-hrms-rebuild

          docker compose pull
          docker compose up -d

          docker compose exec -T php-fpm php artisan migrate --force
          docker compose exec -T php-fpm php artisan optimize

          docker image prune -a -f
          docker builder prune -f

      - name: Deploy server
        run: |
          mkdir -p /home/idjiot/apps/mini-hrms-rebuild
          cd /home/idjiot/apps/mini-hrms-rebuild

          docker compose pull
          docker compose up -d

          docker compose exec -T php-fpm php artisan migrate --force
          docker compose exec -T php-fpm php artisan optimize

          docker image prune -a -f
          docker builder prune -f
